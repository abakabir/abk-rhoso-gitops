apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rhoso-clusters
  namespace: openshift-gitops
spec:
  destinations:
    - server: '*'
      namespace: '*'
  sourceRepos: ["https://github.com/abakabir/abk-rhoso-gitops.git"]
  clusterResourceWhitelist:
    - group: ""      # Groupe vide pour les ressources de base (Namespace, PV, etc.)
      kind: "Namespace"
    - group: "*"     # Autorise tous les groupes pour les CRD (NMState, MetalLB, OpenStack)
      kind: "*"
  # Autorise aussi toutes les ressources au niveau Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
